spring.application.name=prijava-service
server.port=8003
spring.config.import=optional:configserver:http://localhost:8888

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/prijava_db
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.datasource.hikari.maximum-pool-size=2

resilience4j.rateLimiter.instances.prijavaRateLimiter.limit-for-period=3
resilience4j.rateLimiter.instances.prijavaRateLimiter.limit-refresh-period=30s

eureka.client.service-url.defaultZone=http://naming-server:8761/eureka