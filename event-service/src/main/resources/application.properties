spring.application.name=event-service
server.port=8002
spring.config.import=optional:configserver:http://localhost:8888

resilience4j.retry.instances.rezultatRetry.max-attempts=6
resilience4j.retry.instances.rezultatRetry.wait-duration=3s
resilience4j.retry.instances.rezultatRetry.enable-exponential-backoff=true

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/event_db
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.datasource.hikari.maximum-pool-size=2

eureka.client.service-url.defaultZone=http://naming-server:8761/eureka